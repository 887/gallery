<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>

<style>

html{min-height:100%;}
body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
min-height:100vh;
}

/* header */

header{
padding:10px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:center;
gap:5px;
align-items:center;
}

button.folder-btn{
margin:0 5px;
padding:5px 10px;
cursor:pointer;
border:none;
background:rgba(255,255,255,0.2);
color:white;
border-radius:6px;
}

button.folder-btn:hover{
background:rgba(255,255,255,0.4);
}
header.hidden{opacity:0;pointer-events:none;transition:opacity 0.5s;}

/* filter input */
.filter-input{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:6px;
padding:4px 10px;
font-size:13px;
width:150px;
outline:none;
}
.filter-input::placeholder{color:rgba(255,255,255,0.4);}
.filter-input:focus{border-color:rgba(255,255,255,0.6);}

/* gallery image info button (top-left) */
.gallery-info-btn{
position:absolute;
top:5px;
left:5px;
background:rgba(255,255,255,0.25);
color:white;
border:none;
border-radius:3px;
padding:2px 6px;
font-size:12px;
cursor:pointer;
z-index:100;
opacity:0.85;
transition:opacity 0.3s ease;
}
.gallery-info-btn:hover{opacity:1;}
.gallery-info-btn.hidden{opacity:0;pointer-events:none;}

/* info panel */
#infoPanel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(10,10,10,0.95);
color:white;
padding:16px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.25);
z-index:10000;
width:min(640px,90vw);
max-height:80vh;
overflow-y:auto;
display:none;
font-size:13px;
}
#infoPanel.open{display:block;}
.info-panel-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
padding-bottom:8px;
border-bottom:1px solid rgba(255,255,255,0.2);
font-weight:bold;
font-size:14px;
}
.info-field{margin:8px 0;}
.info-field-label{
font-size:10px;
color:rgba(255,255,255,0.5);
text-transform:uppercase;
letter-spacing:0.05em;
margin-bottom:3px;
}
.info-field-value{
background:rgba(255,255,255,0.06);
padding:6px 8px;
border-radius:4px;
white-space:pre-wrap;
word-break:break-word;
font-family:monospace;
font-size:11px;
max-height:220px;
overflow-y:auto;
}
opacity:0;
pointer-events:none;
transition:opacity 0.3s ease;
}

#meowControl.hidden{
opacity:0;
pointer-events:none;
transition:opacity 0.3s ease;
}

.overlay-btn.hidden{
opacity:0;
pointer-events:none;
}

/* slideshow button */

#slideshowBtn{
position:absolute;
right:10px;
top:10px;
}

/* meow control */

#meowControl{
position:fixed;
top:10px;
left:10px;
z-index:9999;
background:rgba(0,0,0,.6);
padding:6px 10px;
border-radius:6px;
display:flex;
gap:5px;
align-items:flex-start;
transition:opacity 0.3s ease;
opacity:1;
}

#meowControl.hidden{
opacity:0;
pointer-events:none;
}

#meowSettings{
position:absolute;
top:40px;
left:0;
background:rgba(0,0,0,.8);
padding:10px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.3);
display:none;
min-width:250px;
max-height:400px;
overflow-y:auto;
z-index:1000;
}

#meowSettings.open{
display:block;
}

.meow-setting-row{
margin:8px 0;
display:flex;
flex-direction:column;
gap:4px;
}

.meow-setting-row label{
font-size:12px;
opacity:0.8;
}

.meow-setting-row input[type="range"]{
width:100%;
cursor:pointer;
}

.meow-setting-row input[type="text"]{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:4px;
border-radius:3px;
font-size:11px;
font-family:monospace;
}

#meowCount{
font-weight:bold;
}

#meowSettingsBtn{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:16px;
padding:0;
opacity:0.7;
}

#meowSettingsBtn:hover{
opacity:1;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
padding:10px;
}

.image-container{
position:relative;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
border-radius:6px;
display:block;
}

/* overlay buttons */

.overlay-btn{
position:relative;
padding:2px 5px;
font-size:12px;
border:none;
background:rgba(255,255,255,0.3);
color:black;
border-radius:3px;
cursor:pointer;
opacity:0.8;
transition:opacity 0.3s ease;
z-index:100;
margin:0;
flex-shrink:0;
}

.overlay-btn.hidden{
opacity:0;
pointer-events:none;
}

.overlay-btn:hover{opacity:1;}

/* viewer */

.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:5001;
}

.viewer-image{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.viewer-image img{
width:100%;
height:100%;
display:block;
object-fit:contain;
}

/* navigation */

.nav-btn{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:40px;
background:rgba(0,0,0,0.4);
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
transition:opacity 0.3s ease;
opacity:1;
z-index:5002;
pointer-events:auto !important;
}

.nav-btn.hidden{
opacity:0;
pointer-events:none !important;
}

.left{left:20px;}
.right{right:20px;}

/* slideshow */

#slideshow{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;
background:black;
display:none;
z-index:5000;
overflow:hidden;
}

.slide{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity var(--fade-duration, 1.5s);
z-index:5001;
pointer-events:none;
}

.slide.active{
opacity:1;
pointer-events:auto;
}

.slide-image{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.slide img{
width:100%;
height:100%;
display:block;
object-fit:contain;
}

/* slideshow slide buttons - match fullscreen positions */

.slide .overlay-bad{ left:5px; bottom:5px; top:auto; }
.slide .overlay-good{ right:5px; bottom:5px; top:auto; }

/* slideshow controls */

#slideshowControls{
position:fixed;
bottom:1px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
align-items:center;
z-index:5002;
background:rgba(0,0,0,0.25);
padding:10px 20px;
border-radius:8px;
transition:opacity 0.3s ease;
opacity:1;
}

#slideshowControls.hidden{
opacity:0;
pointer-events:none;
}

#viewerControls{
transition:opacity 0.3s ease;
opacity:1;
}

#viewerControls.hidden{
opacity:0 !important;
pointer-events:none;
}

#slideshowControls button:hover{
opacity:1;
}

#slideshowMode{
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
font-size:12px;
min-width:60px;
}

/* slideshow progress bar at bottom */

#slideProgress{
position:absolute;
left:0;
bottom:0;
height:4px;
background:rgba(255,255,255,0.6);
transition:width 0.3s ease;
z-index:10;
}

/* number inputs */

.num-spin,
.num-input{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
width:65px;
font-size:12px;
}

.meow-setting-row select{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
font-size:12px;
width:100%;
cursor:pointer;
}

/* meow text */

.meow{
position:fixed;
left:50%;
transform:translateX(-50%);
opacity:0;
animation:meowSlideIn var(--meow-slide, 1s) ease-out forwards, meowFade var(--meow-duration, 3s) linear var(--meow-slide, 1s) forwards;
pointer-events:none;
z-index:10000;
font-size:40px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
}

@keyframes meowSlideIn{
0%{
opacity:0;
transform:translateX(-50%) translateY(var(--meow-start-y, 0)) translateX(var(--meow-start-x, 0)) rotate(var(--meow-tilt, 0deg));
}
100%{
opacity:1;
transform:translateX(-50%) translateY(var(--meow-visible-y, 0)) translateX(var(--meow-visible-x, 0)) rotate(var(--meow-tilt, 0deg));
}
}

@keyframes meowFade{
0%{
opacity:1;
transform:translateX(-50%) translateY(var(--meow-visible-y, 0)) translateX(var(--meow-visible-x, 0)) rotate(var(--meow-tilt, 0deg));
}
100%{
opacity:0;
transform:translateX(-50%) translateY(var(--meow-end-y, 0)) translateX(var(--meow-end-x, 0)) rotate(var(--meow-tilt, 0deg));
}
}

/* control bar buttons and styling */

.control-btn{
font-size:14px;
padding:4px 8px;
border:none;
background:rgba(255,255,255,0.3);
color:white;
border-radius:3px;
cursor:pointer;
opacity:0.8;
transition:opacity 0.2s ease;
}

.control-btn:hover{
opacity:1;
}

.control-btn-small{
padding:2px 5px;
font-size:12px;
}

.control-section{
display:flex;
gap:10px;
align-items:center;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.control-counter{
font-size:12px;
min-width:50px;
color:white;
}

.fade-control{
display:flex;
gap:5px;
align-items:center;
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.fade-label{
font-size:12px;
}

.fade-unit{
font-size:11px;
}

.speed-control{
display:flex;
gap:8px;
align-items:center;
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.speed-label{
font-size:12px;
}

.num-input{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
font-size:12px;
}

</style>
</head>

<body>

<div id="meowControl">
<label><input type="checkbox" id="meowToggle"> Meow Mode</label>
<button id="meowSettingsBtn">⚙️</button>
<div id="meowSettings">
<div class="meow-setting-row">
<label>Frequency (/s)</label>
<input class="num-spin" type="number" id="meowFreqN" min="0.1" max="20" step="0.1" value="1">
</div>
<div class="meow-setting-row">
<label>Count</label>
<input class="num-spin" type="number" id="meowCountN" min="1" max="20" step="1" value="1">
</div>
<div class="meow-setting-row">
<label>Delay (ms)</label>
<input class="num-spin" type="number" id="meowDelayN" min="0" max="2000" step="10" value="0">
</div>
<div class="meow-setting-row">
<label>Slide In (s)</label>
<input class="num-spin" type="number" id="meowSlideN" min="0" max="10" step="0.1" value="1">
</div>
<div class="meow-setting-row">
<label>Fade (s)</label>
<input class="num-spin" type="number" id="meowFadeN" min="0.1" max="30" step="0.1" value="10">
</div>
<div class="meow-setting-row">
<label>Direction</label>
<select id="meowDirSel">
<option value="0">→ Right</option>
<option value="1" selected>↑ Up</option>
<option value="2">↓ Down</option>
<option value="3">← Left</option>
</select>
</div>
<div class="meow-setting-row">
<label>Position V (%)</label>
<input class="num-spin" type="number" id="meowPosN" min="0" max="100" step="1" value="20">
</div>
<div class="meow-setting-row">
<label>Spawn H spread (%)</label>
<input class="num-spin" type="number" id="meowHeightN" min="0" max="50" step="1" value="10">
</div>
<div class="meow-setting-row">
<label>Spawn W spread (%)</label>
<input class="num-spin" type="number" id="meowWidthN" min="0" max="100" step="1" value="50">
</div>
<div class="meow-setting-row">
<label>Random tilt (±deg)</label>
<input class="num-spin" type="number" id="meowTiltN" min="0" max="45" step="1" value="12">
</div>
<div class="meow-setting-row">
<label>Meow Texts (CSV):</label>
<input type="text" id="meowTexts" placeholder="MEOW!,MEOW!!,MEOW !" value="MEOW!,MEOW !!,MEOW !">
</div>
</div>
</div>

<header>

<div id="folderButtonsContainer"></div>

<button class="folder-btn" onclick="shuffleCurrent()">Shuffle</button>

<button class="folder-btn" id="slideshowBtn" onclick="startSlideshow()">Slideshow</button>

<input type="text" id="filterInput" class="filter-input" placeholder="filter prompts…">

</header>

<div class="gallery" id="gallery"></div>

<!-- viewer -->

<div class="viewer" id="viewer">

<button onclick="event.stopPropagation(); prevImage()" class="nav-btn left">◀</button>

<div class="viewer-image">

<img id="full">

</div>



<button onclick="event.stopPropagation(); nextImage()" class="nav-btn right">▶</button>

<div id="viewerControls" style="position:fixed; bottom:1px; left:50%; transform:translateX(-50%); display:flex; gap:10px; align-items:center; z-index:5002; background:rgba(0,0,0,0.25); padding:10px 20px; border-radius:8px; transition:opacity 0.3s ease; opacity:1;">

<button onclick="prevImage()" title="Prev" class="control-btn">◀</button>
<button onclick="nextImage()" title="Next" class="control-btn">▶</button>
<button onclick="closeViewer()" title="Close" class="control-btn">✕</button>

<div class="control-section" style="margin-left:auto;">
<button onclick="toggleImageScale()" title="Toggle scale" class="control-btn" style="font-size:11px;">📐</button>
<button onclick="toggleOriginalSize()" title="Original size" class="control-btn" style="font-size:10px;">100%</button>

<div class="control-counter">
<span id="viewerCounterDisplay">1/0</span>
</div>

<button onclick="showInfoPanel(currentImages[currentIndex])" title="Image info" class="control-btn">ℹ</button>

<button id="viewerBad" class="control-btn control-btn-small" style="display:none;">B</button>
<button id="viewerRemove" class="control-btn control-btn-small" style="display:none;">R</button>
<button id="viewerGood" class="control-btn control-btn-small" style="display:none;">G</button>
</div>

</div>

</div>

<!-- slideshow -->

<div id="slideshow">

<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex-1)" class="nav-btn left">◀</button>

<div class="slide" id="slideA">
<div class="slide-image">
<img>
</div>
</div>
<div class="slide" id="slideB">
<div class="slide-image">
<img>
</div>
</div>

<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex+1)" class="nav-btn right">▶</button>

<div id="slideshowControls">
<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex-1)" title="Prev" class="control-btn">◀</button>
<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex+1)" title="Next" class="control-btn">▶</button>
<button id="slideshowDirectionBtn" onclick="resetControlsHideTimer(); togglePlayDirection()" title="Play Forward" class="control-btn">⏩</button>
<button onclick="resetControlsHideTimer(); togglePlay()" title="Play/Pause" class="control-btn">⏯</button>
<button onclick="closeSlideshowAndReset()" title="Close" class="control-btn">✕</button>
<button onclick="resetControlsHideTimer(); showInfoPanel(currentImages[slideIndex])" title="Image info" class="control-btn">ℹ</button>

<div class="speed-control">
<label class="speed-label">img/s:</label>
<input class="num-input" type="number" id="speedNum" min="0.1" max="20" step="0.1" value="0.3" style="width:65px;">
</div>

<div id="slideshowMode">
<span id="modeDisplay">⏸</span>
</div>

<div class="fade-control">
<label class="fade-label">fade:</label>
<input class="num-input" type="number" id="fadeNum" min="0.1" max="5" step="0.1" value="2" style="width:50px;">
<span class="fade-unit">s</span>
</div>

<div class="control-section" style="margin-left:auto;">
<button onclick="resetControlsHideTimer(); toggleImageScale()" title="Toggle scale" class="control-btn" style="font-size:14px;">📐</button>
<button onclick="resetControlsHideTimer(); toggleOriginalSize()" title="Original size" class="control-btn" style="font-size:12px;">100%</button>

<div class="control-counter">
<span id="slideshowCounterDisplay">1/0</span>
</div>
</div>
</div>
<div id="slideProgress" style="width:0%"></div>

</div>

<!-- info panel -->
<div id="infoPanel">
<div class="info-panel-header">
<span>📋 Image Info</span>
<button onclick="closeInfoPanel()" class="control-btn">✕</button>
</div>
<div id="infoPanelContent"></div>
</div>

<script>

/* core variables */

const gallery=document.getElementById('gallery')
const viewer=document.getElementById('viewer')
const full=document.getElementById('full')

let slideIndex=0
let slideshowTimer=null
let slideshowDirection=1
let playing=false
let slideshowSpeed=0.3
let autoAdvanceDisabled=false
let autoAdvanceTimeout=null

let currentImages=[]
let allImages=[]
let galleryFilter=''
let currentIndex=0
let currentFolder='root'
let allFolders=[]
let headerButtonsHideTimer=null

/* ======  URL hash persistence  ====== */

function updateUrlHash(){
const parts=[]
if(currentFolder!=='root') parts.push('path='+encodeURIComponent(currentFolder))
if(galleryFilter) parts.push('filter='+encodeURIComponent(galleryFilter))
history.replaceState(null,'',location.pathname+(parts.length?'#'+parts.join('&'):''))
}

function readUrlHash(){
const hash=location.hash.replace(/^#/,'')
const params={}
hash.split('&').forEach(p=>{
const eq=p.indexOf('=')
if(eq>0) params[decodeURIComponent(p.slice(0,eq))]=decodeURIComponent(p.slice(eq+1))
})
return {folder:params.path||'root', filter:params.filter||''}
}

/* ======  filter  ====== */

function applyFilter(text, skipHash){
galleryFilter=text
if(!skipHash) updateUrlHash()
if(!text.trim()){
currentImages=[...allImages]
renderImages()
return
}
fetch(`/api/list?folder=${currentFolder}&filter=${encodeURIComponent(text)}`)
.then(r=>r.json())
.then(filtered=>{
currentImages=filtered
renderImages()
})
}

/* ======  info panel  ====== */

function showInfoPanel(src){
if(!src) return
const panel=document.getElementById('infoPanel')
const content=document.getElementById('infoPanelContent')
content.innerHTML='<div style="color:rgba(255,255,255,0.45);padding:8px">Loading\u2026</div>'
panel.classList.add('open')
fetch(`/api/meta?image=${encodeURIComponent(src)}`)
.then(r=>r.json())
.then(meta=>{
content.innerHTML=''
// preferred key order
const order=['user_metadata','filename','size_kb','modified','prompt','workflow','parameters']
const keys=[...new Set([...order.filter(k=>meta[k]!=null),...Object.keys(meta)])]
keys.forEach(key=>{
const val=meta[key]
if(val==null) return
const field=document.createElement('div')
field.className='info-field'
const lbl=document.createElement('div')
lbl.className='info-field-label'
lbl.textContent=key.replace(/_/g,' ')
const vd=document.createElement('div')
vd.className='info-field-value'
let display=val
if(key==='size_kb') display=val+' KB'
else if(key==='modified') display=new Date(val).toLocaleString()
else if(typeof val==='string'){try{display=JSON.stringify(JSON.parse(val),null,2)}catch(e){}}
else display=String(val)
vd.textContent=display
field.appendChild(lbl)
field.appendChild(vd)
content.appendChild(field)
})
})
.catch(()=>{
content.innerHTML='<div style="color:rgba(255,100,100,0.8);padding:8px">No metadata found</div>'
})
}

function closeInfoPanel(){document.getElementById('infoPanel').classList.remove('open')}

/* ======  folder button logic  ====== */

function generateSmartAbbreviation(folderName, otherFolders) {
    const allNames = [folderName, ...otherFolders];
    for(let len = 1; len <= folderName.length; len++) {
        const abbr = folderName.substring(0, len).toUpperCase();
        const conflicts = allNames.filter(n => 
            n !== folderName && n.substring(0, len).toUpperCase() === abbr
        );
        if(conflicts.length === 0) return abbr;
    }
    return folderName.substring(0, 3).toUpperCase();
}

function loadFolderButtons() {
    fetch('/api/folders')
        .then(r => r.json())
        .then(folders => {
            allFolders = folders;
            renderFolderButtons();
        });
}

function renderFolderButtons() {
    const container = document.getElementById('folderButtonsContainer');
    container.innerHTML = '';
    container.style.display = 'flex';
    container.style.gap = '5px';
    
    // Add root button
    const rootBtn = document.createElement('button');
    rootBtn.className = 'folder-btn ' + (currentFolder === 'root' ? 'active' : '');
    rootBtn.textContent = 'All';
    rootBtn.onclick = () => loadImages('root');
    container.appendChild(rootBtn);
    
    // Add folder buttons
    allFolders.forEach(folder => {
        const btn = document.createElement('button');
        const abbr = generateSmartAbbreviation(folder, allFolders.filter(f => f !== folder));
        btn.className = 'folder-btn ' + (currentFolder === folder ? 'active' : '');
        btn.textContent = abbr;

/* fade logic */

let lastSlideShown = -1

function showSlide(i){

if(i<0) i=currentImages.length-1
if(i>=currentImages.length) i=0

// Only apply fade transition if actually changing slides
if(i === lastSlideShown) return
lastSlideShown = i

slideIndex=i

const slideshow = document.getElementById('slideshow')
const isInSlideshow = slideshow && slideshow.style.display === 'block'

// update progress bar at bottom
if(currentImages.length>1){
document.getElementById('slideProgress').style.width=(i/(currentImages.length-1)*100)+'%'
}

const slide1=document.getElementById('slideA')
const slide2=document.getElementById('slideB')

const active=slide1.classList.contains('active')?slide1:slide2
const next=active===slide1?slide2:slide1

next.querySelector('img').src=currentImages[i]

active.classList.remove('active')
next.classList.add('active')

// Update image counter
const counterDisplay = document.getElementById('slideshowCounterDisplay')
if(counterDisplay){
counterDisplay.textContent = (i+1) + '/' + currentImages.length
}

// Delay scroll update until fade finishes (but only if user isn't actively scrolling)
if(isInSlideshow && !userScrollingInSlideshow){
setTimeout(() => {
if(slideshow.style.display === 'block' && !userScrollingInSlideshow){
const scrollY = (i / (currentImages.length - 1)) * (document.body.scrollHeight - window.innerHeight)
window.scrollTo(0, scrollY)
}
}, fadeDuration * 1000)
}

}

/* scroll position tracking for gallery to fullscreen */

let galleryScrollPosition = 0

/* scroll tracking for slideshow and viewer - proportional to scroll position */

let cumulativeScroll = 0
const scrollThreshold = 50 // pixels needed to change slide
let lastMiddleClick = 0
let autoscrollActive = false
let lastImageIndex = -1
let lastSlideshowIndex = -1
let ignoreScrollEvents = false
let userScrollingInSlideshow = false
let scrollTimeoutId = null

// Detect middle mouse down for Firefox autoscroll
document.addEventListener('mousedown', e => {
if(e.button === 1){
lastMiddleClick = Date.now()
}
})

// Wheel scroll in slideshow - let browser scroll naturally, scroll event handles slide change
document.addEventListener('wheel', e => {
const slideshow = document.getElementById('slideshow')
if(slideshow.style.display !== 'block') return
// No preventDefault - let browser scroll so native scrollbar works
}, {passive: true})

// Track scroll position for both viewer and slideshow modes
document.addEventListener('scroll', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
const now = Date.now()

// Slideshow mode - use proportional scroll mapping like viewer
if(slideshow.style.display === 'block'){
if(currentImages.length === 0) return

// Mark that user is scrolling - prevents programmatic scroll updates from conflicting
userScrollingInSlideshow = true
clearTimeout(scrollTimeoutId)
scrollTimeoutId = setTimeout(() => {
userScrollingInSlideshow = false
}, 300)

// Disable auto-advance while user is scrolling
disableAutoAdvance()

const scrollY = window.scrollY || document.documentElement.scrollTop
const documentHeight = document.documentElement.scrollHeight
const viewportHeight = window.innerHeight

// Total scrollable distance
const totalScroll = documentHeight - viewportHeight

// Calculate which slide should be shown based on scroll percentage
let imageIndex = 0
if(totalScroll > 0){
const scrollPercentage = scrollY / totalScroll
imageIndex = Math.min(
Math.floor(scrollPercentage * currentImages.length),
currentImages.length - 1
)
}

// Only update if we've moved to a different slide
if(imageIndex !== lastSlideshowIndex){
lastSlideshowIndex = imageIndex
slideIndex = imageIndex
showSlide(imageIndex)
}
return
}

// Viewer mode - use proportional scroll mapping
if(viewer.style.display !== 'flex' || currentImages.length === 0 || ignoreScrollEvents) return

const scrollY = window.scrollY || document.documentElement.scrollTop
const documentHeight = document.documentElement.scrollHeight
const viewportHeight = window.innerHeight

// Total scrollable distance
const totalScroll = documentHeight - viewportHeight

// Calculate which image should be shown based on scroll percentage
let imageIndex = 0
if(totalScroll > 0){
const scrollPercentage = scrollY / totalScroll
imageIndex = Math.min(
Math.floor(scrollPercentage * currentImages.length),
currentImages.length - 1
)
}

// Only update if we've moved to a different image
if(imageIndex !== lastImageIndex){
lastImageIndex = imageIndex
showImage(imageIndex)
}
}, {passive: true})

document.addEventListener('mouseup', e => {
if(e.button === 1){
autoscrollActive = false
cumulativeScroll = 0
}
})

e.preventDefault()
startSlideshow()
return
}

if(slideshow.style.display !== 'block') return

if(e.key === 'ArrowRight') showSlide(slideIndex + 1)
if(e.key === 'ArrowLeft') showSlide(slideIndex - 1)
if(e.key === 'Escape'){

}
})

if(nextIndex >= currentImages.length) {
nextIndex = currentImages.length - 1
}
lastSlideShown = -1 // Force fade transition
showSlide(nextIndex)
loadCounts()
}

/* slideshow controls bar buttons - handled by updateSlideshowFolderButtons() */

/* meow settings */

const meowToggle = document.getElementById('meowToggle')
const meowSettingsBtn = document.getElementById('meowSettingsBtn')
const meowSettingsPanel = document.getElementById('meowSettings')
const meowTexts = document.getElementById('meowTexts')

const meowFreqN = document.getElementById('meowFreqN')
const meowCountN = document.getElementById('meowCountN')
const meowDelayN = document.getElementById('meowDelayN')
const meowSlideN = document.getElementById('meowSlideN')
const meowFadeN = document.getElementById('meowFadeN')
const meowDirSel = document.getElementById('meowDirSel')
const meowPosN = document.getElementById('meowPosN')
const meowHeightN = document.getElementById('meowHeightN')
const meowWidthN = document.getElementById('meowWidthN')
const meowTiltN = document.getElementById('meowTiltN')

let meowFrequency = 1
let meowCount = 1
let meowDelayMs = 0
let meowSlideDuration = 1
let meowFadeDuration = 10
let meowDirection = 1
let meowPosition = 20
let meowSpawnHeight = 10
let meowSpawnWidth = 50
let meowTilt = 12

meowSettingsBtn.addEventListener('click', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
meowSettingsPanel.classList.toggle('open')
})

document.addEventListener('click', e => {
if(!meowSettingsPanel.contains(e.target) && e.target !== meowSettingsBtn){
meowSettingsPanel.classList.remove('open')
}
})

;[meowFreqN,meowCountN,meowDelayN,meowSlideN,meowFadeN,meowPosN,meowHeightN,meowWidthN,meowTiltN,meowDirSel,meowTexts].forEach(el=>{
el.addEventListener('input', ()=>{
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
meowFrequency = parseFloat(meowFreqN.value)||1
meowCount = parseInt(meowCountN.value)||1
meowDelayMs = parseInt(meowDelayN.value)||0
meowSlideDuration = parseFloat(meowSlideN.value)||1
meowFadeDuration = parseFloat(meowFadeN.value)||10
meowDirection = parseInt(meowDirSel.value)||1
meowPosition = parseInt(meowPosN.value)||20
meowSpawnHeight = parseInt(meowHeightN.value)||10
meowSpawnWidth = parseInt(meowWidthN.value)||50
meowTilt = parseInt(meowTiltN.value)||12
saveMeowSettings()
})
})

function saveMeowSettings(){
const settings = {
frequency: meowFrequency, count: meowCount, delayMs: meowDelayMs,
slideDuration: meowSlideDuration, fadeDuration: meowFadeDuration,
direction: meowDirection, position: meowPosition,
spawnHeight: meowSpawnHeight, spawnWidth: meowSpawnWidth,
tilt: meowTilt, texts: meowTexts.value
}
document.cookie = 'meowSettings=' + encodeURIComponent(JSON.stringify(settings)) + '; path=/; max-age=31536000'
}

function loadMeowSettings(){
const cookies = document.cookie.split(';')
for(let cookie of cookies){
const [name, val] = cookie.trim().split('=')
if(name === 'meowSettings'){
try{
const s = JSON.parse(decodeURIComponent(val))
meowFrequency = s.frequency||1; meowCount = s.count||1; meowDelayMs = s.delayMs||0
meowSlideDuration = s.slideDuration||1; meowFadeDuration = s.fadeDuration||10
meowDirection = s.direction||1; meowPosition = s.position||20
meowSpawnHeight = s.spawnHeight!==undefined ? s.spawnHeight : 10
meowSpawnWidth = s.spawnWidth!==undefined ? s.spawnWidth : 50
meowTilt = s.tilt||12
meowFreqN.value = meowFrequency; meowCountN.value = meowCount; meowDelayN.value = meowDelayMs
meowSlideN.value = meowSlideDuration; meowFadeN.value = meowFadeDuration
meowDirSel.value = meowDirection; meowPosN.value = meowPosition
meowHeightN.value = meowSpawnHeight; meowWidthN.value = meowSpawnWidth
meowTiltN.value = meowTilt
if(s.texts) meowTexts.value = s.texts
}catch(e){}
break
}
}
}

function startMeowSpawning(){
let nextSpawnTime = 0
setInterval(() => {
if(!meowToggle.checked) return
const now = Date.now()
const timeSinceLastSpawn = now - nextSpawnTime
const intervalMs = Math.ceil(1000 / meowFrequency)
if(timeSinceLastSpawn < intervalMs) return
nextSpawnTime = now

const textList = meowTexts.value.split(',').map(t => t.trim()).filter(t => t.length > 0)
if(textList.length === 0) return

// Spawn multiple meows
for(let n = 0; n < meowCount; n++){
// Calculate randomness upfront so each meow gets unique values - convert percentage to pixels
const offsetY = (Math.random() * meowSpawnHeight - meowSpawnHeight / 2) / 100 * window.innerHeight
const offsetX = (Math.random() * meowSpawnWidth - meowSpawnWidth / 2) / 100 * window.innerWidth
const tiltDeg = meowTilt > 0 ? (Math.random() * 2 - 1) * meowTilt : 0
const dirRandom = Math.random() > 0.5 ? 100 : -100

setTimeout(() => {
// Calculate direction movement
let moveYStart = 0, moveYEnd = 0, moveXStart = 0, moveXEnd = 0

if(meowDirection === 0){
// → right
moveXStart = -100
moveXEnd = 100
} else if(meowDirection === 1){
// ↑ up
moveYStart = 100
moveYEnd = -100
} else if(meowDirection === 2){
// ↓ down
moveYStart = -100
moveYEnd = 100
} else if(meowDirection === 3){
// ← left
moveXStart = dirRandom
moveXEnd = -dirRandom
}

const m = document.createElement('div')
m.className = 'meow'
m.textContent = textList[Math.floor(Math.random() * textList.length)]
m.style.top = meowPosition + '%'
m.style.left = '50%'
m.style.setProperty('--meow-slide', meowSlideDuration + 's')
m.style.setProperty('--meow-duration', meowFadeDuration + 's')
m.style.setProperty('--meow-visible-y', offsetY + 'px')
m.style.setProperty('--meow-visible-x', offsetX + 'px')
m.style.setProperty('--meow-start-y', (moveYStart + offsetY) + 'px')
m.style.setProperty('--meow-start-x', (moveXStart + offsetX) + 'px')
m.style.setProperty('--meow-end-y', (moveYEnd + offsetY) + 'px')
m.style.setProperty('--meow-end-x', (moveXEnd + offsetX) + 'px')
m.style.setProperty('--meow-tilt', tiltDeg + 'deg')
document.body.appendChild(m)
setTimeout(() => m.remove(), (meowSlideDuration + meowFadeDuration) * 1000)
}, meowDelayMs * n)
}
}, 50)
}

meowToggle.addEventListener('change', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
saveMeowSettings()
})

loadCounts()
loadMeowSettings()
startMeowSpawning()
loadImageScaleFromCookie()
loadOriginalSizeFromCookie()

// Load slideshow settings from localStorage
const savedSpeed = localStorage.getItem('slideshowSpeed')
const savedFade = localStorage.getItem('slideshowFadeDuration')
if(savedSpeed){
slideshowSpeed = parseFloat(savedSpeed)
document.getElementById('speedNum').value = slideshowSpeed
}
if(savedFade){
fadeDuration = parseFloat(savedFade)
document.getElementById('fadeNum').value = fadeDuration
document.documentElement.style.setProperty('--fade-duration', fadeDuration + 's')
}

/* read URL hash first, then load */
const _hashState = readUrlHash()
galleryFilter = _hashState.filter
if(galleryFilter){
const fi=document.getElementById('filterInput')
if(fi) fi.value=galleryFilter
}

loadFolderButtons()
loadImages(_hashState.folder)

/* filter input wiring */
;(()=>{
const fi=document.getElementById('filterInput')
let _fd=null
fi.addEventListener('input',()=>{
resetHeaderButtonsHideTimer()
clearTimeout(_fd)
_fd=setTimeout(()=>applyFilter(fi.value),320)
})
fi.addEventListener('keydown',e=>{
if(e.key==='Escape'){fi.value='';applyFilter('')}
})})()

/* gallery button fade out after 2 seconds of no mouse movement */

function resetHeaderButtonsHideTimer(){
clearTimeout(headerButtonsHideTimer)
const header = document.querySelector('header')
const meowControl = document.getElementById('meowControl')
const overlayBtns = document.querySelectorAll('.overlay-btn')
const infoBtns = document.querySelectorAll('.gallery-info-btn')
header.classList.remove('hidden')
meowControl.classList.remove('hidden')
overlayBtns.forEach(btn => btn.classList.remove('hidden'))
infoBtns.forEach(btn => btn.classList.remove('hidden'))
const viewer = document.getElementById('viewer')
const slideshow = document.getElementById('slideshow')
const inFullscreen = viewer.style.display === 'flex' || slideshow.style.display === 'block'
headerButtonsHideTimer = setTimeout(() => {
const scrollY = window.scrollY || document.documentElement.scrollTop
// Overlay buttons ALWAYS hide after 2 seconds (in any mode)
overlayBtns.forEach(btn => btn.classList.add('hidden'))
infoBtns.forEach(btn => btn.classList.add('hidden'))
// Header buttons: hide if in fullscreen OR if scrolled down in gallery (scrollY > 0)
if(inFullscreen || scrollY > 0){
header.classList.add('hidden')
meowControl.classList.add('hidden')
}
}, 2000)
}

document.getElementById('gallery').addEventListener('mousemove', resetHeaderButtonsHideTimer)
document.getElementById('gallery').addEventListener('click', resetHeaderButtonsHideTimer)
document.getElementById('gallery').addEventListener('wheel', () => {
// Only reset timer if gallery is visible (not in slideshow/viewer)
const gallery = document.getElementById('gallery')
if(gallery && gallery.offsetParent !== null) {
resetHeaderButtonsHideTimer()
}
})

// Show buttons on page load
resetHeaderButtonsHideTimer()

</script>
