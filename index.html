<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>

<style>

html{height:100%;}
body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
height:100%;
}

/* header */

header{
padding:10px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
background:#111;
border-bottom:1px solid rgba(255,255,255,0.1);
}

button.folder-btn{
margin:0 5px;
padding:5px 10px;
cursor:pointer;
border:none;
background:rgba(255,255,255,0.2);
color:white;
border-radius:6px;
}

button.folder-btn:hover{
background:rgba(255,255,255,0.4);
}

/* slideshow button */

#slideshowBtn{
position:absolute;
right:10px;
top:10px;
}

/* meow control */

#meowControl{
position:fixed;
top:10px;
left:10px;
z-index:9999;
background:rgba(0,0,0,.6);
padding:6px 10px;
border-radius:6px;
display:flex;
gap:5px;
align-items:center;
transition:opacity 0.3s ease;
opacity:1;
}

#meowControl.hidden{
opacity:0;
pointer-events:none;
}

#meowSettings{
position:fixed;
top:50px;
left:10px;
z-index:9999;
background:rgba(0,0,0,.8);
padding:10px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.3);
display:none;
min-width:250px;
max-height:400px;
overflow-y:auto;
}

#meowSettings.open{
display:block;
}

.meow-setting-row{
margin:8px 0;
display:flex;
flex-direction:column;
gap:4px;
}

.meow-setting-row label{
font-size:12px;
opacity:0.8;
}

.meow-setting-row input[type="range"]{
width:100%;
cursor:pointer;
}

.meow-setting-row input[type="text"]{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:4px;
border-radius:3px;
font-size:11px;
font-family:monospace;
}

#meowCount{
font-weight:bold;
}

#meowSettingsBtn{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:16px;
padding:0;
opacity:0.7;
}

#meowSettingsBtn:hover{
opacity:1;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
padding:10px;
}

.image-container{
position:relative;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
border-radius:6px;
display:block;
}

/* overlay buttons */

.overlay-btn{
position:absolute;
bottom:5px;
padding:2px 5px;
font-size:12px;
border:none;
background:rgba(255,255,255,0.3);
color:black;
border-radius:3px;
cursor:pointer;
opacity:0.8;
transition:opacity 0.3s ease;
}

.overlay-btn.hidden{
opacity:0;
pointer-events:none;
}

.overlay-good{right:5px;}
.overlay-bad{left:5px;}

.overlay-btn:hover{opacity:1;}

/* viewer */

.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
}

.viewer-image{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.viewer-image img{
width:100%;
height:100%;
display:block;
object-fit:contain;
}

/* navigation */

.nav-btn{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:40px;
background:rgba(0,0,0,0.4);
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
transition:opacity 0.3s ease;
opacity:1;
z-index:5002;
pointer-events:auto !important;
}

.nav-btn.hidden{
opacity:0;
pointer-events:none !important;
}

.left{left:20px;}
.right{right:20px;}

/* slideshow */

#slideshow{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;
background:black;
display:none;
z-index:5000;
overflow:hidden;
}

.slide{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity var(--fade-duration, 1.5s);
z-index:5001;
pointer-events:none;
}

.slide.active{
opacity:1;
pointer-events:auto;
}

.slide-image{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.slide img{
width:100%;
height:100%;
display:block;
object-fit:contain;
}

/* slideshow slide buttons - match fullscreen positions */

.slide .overlay-bad{ left:5px; bottom:5px; top:auto; }
.slide .overlay-good{ right:5px; bottom:5px; top:auto; }

/* slideshow controls */

#slideshowControls{
position:fixed;
bottom:1px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
align-items:center;
z-index:5002;
background:rgba(0,0,0,0.25);
padding:10px 20px;
border-radius:8px;
transition:opacity 0.3s ease;
opacity:1;
}

#slideshowControls.hidden{
opacity:0;
pointer-events:none;
}

#viewerControls{
transition:opacity 0.3s ease;
opacity:1;
}

#viewerControls.hidden{
opacity:0 !important;
pointer-events:none;
}

#slideshowControls button:hover{
opacity:1;
}

#slideshowMode{
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
font-size:12px;
min-width:60px;
}

/* slideshow progress bar at bottom */

#slideProgress{
position:absolute;
left:0;
bottom:0;
height:4px;
background:rgba(255,255,255,0.6);
transition:width 0.3s ease;
z-index:10;
}

/* number inputs */

.num-spin,
.num-input{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
width:65px;
font-size:12px;
}

.meow-setting-row select{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
font-size:12px;
width:100%;
cursor:pointer;
}

/* meow text */

.meow{
position:fixed;
left:50%;
transform:translateX(-50%);
opacity:0;
animation:meowSlideIn var(--meow-slide, 1s) ease-out forwards, meowFade var(--meow-duration, 3s) linear var(--meow-slide, 1s) forwards;
pointer-events:none;
z-index:10000;
font-size:40px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
}

@keyframes meowSlideIn{
0%{
opacity:0;
transform:translateX(-50%) translateY(var(--meow-start-y, 0)) translateX(var(--meow-start-x, 0)) rotate(var(--meow-tilt, 0deg));
}
100%{
opacity:1;
transform:translateX(-50%) translateY(var(--meow-visible-y, 0)) translateX(var(--meow-visible-x, 0)) rotate(var(--meow-tilt, 0deg));
}
}

@keyframes meowFade{
0%{
opacity:1;
transform:translateX(-50%) translateY(var(--meow-visible-y, 0)) translateX(var(--meow-visible-x, 0)) rotate(var(--meow-tilt, 0deg));
}
100%{
opacity:0;
transform:translateX(-50%) translateY(var(--meow-end-y, 0)) translateX(var(--meow-end-x, 0)) rotate(var(--meow-tilt, 0deg));
}
}

/* control bar buttons and styling */

.control-btn{
font-size:14px;
padding:4px 8px;
border:none;
background:rgba(255,255,255,0.3);
color:white;
border-radius:3px;
cursor:pointer;
opacity:0.8;
transition:opacity 0.2s ease;
}

.control-btn:hover{
opacity:1;
}

.control-btn-small{
padding:2px 5px;
font-size:12px;
}

.control-section{
display:flex;
gap:10px;
align-items:center;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.control-counter{
font-size:12px;
min-width:50px;
color:white;
}

.fade-control{
display:flex;
gap:5px;
align-items:center;
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.fade-label{
font-size:12px;
}

.fade-unit{
font-size:11px;
}

.speed-control{
display:flex;
gap:8px;
align-items:center;
margin-left:10px;
padding-left:10px;
border-left:1px solid rgba(255,255,255,0.3);
}

.speed-label{
font-size:12px;
}

.num-input{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
border-radius:3px;
padding:2px 4px;
font-size:12px;
}

</style>
</head>

<body>

<div id="meowControl">
<label><input type="checkbox" id="meowToggle"> Meow Mode</label>
<button id="meowSettingsBtn">⚙️</button>
</div>

<div id="meowSettings">
<div class="meow-setting-row">
<label>Frequency (/s)</label>
<input class="num-spin" type="number" id="meowFreqN" min="0.1" max="20" step="0.1" value="1">
</div>
<div class="meow-setting-row">
<label>Count</label>
<input class="num-spin" type="number" id="meowCountN" min="1" max="20" step="1" value="1">
</div>
<div class="meow-setting-row">
<label>Delay (ms)</label>
<input class="num-spin" type="number" id="meowDelayN" min="0" max="2000" step="10" value="0">
</div>
<div class="meow-setting-row">
<label>Slide In (s)</label>
<input class="num-spin" type="number" id="meowSlideN" min="0" max="10" step="0.1" value="1">
</div>
<div class="meow-setting-row">
<label>Fade (s)</label>
<input class="num-spin" type="number" id="meowFadeN" min="0.1" max="30" step="0.1" value="10">
</div>
<div class="meow-setting-row">
<label>Direction</label>
<select id="meowDirSel">
<option value="0">→ Right</option>
<option value="1" selected>↑ Up</option>
<option value="2">↓ Down</option>
<option value="3">← Left</option>
</select>
</div>
<div class="meow-setting-row">
<label>Position V (%)</label>
<input class="num-spin" type="number" id="meowPosN" min="0" max="100" step="1" value="20">
</div>
<div class="meow-setting-row">
<label>Spawn H spread (px)</label>
<input class="num-spin" type="number" id="meowHeightN" min="0" max="400" step="5" value="15">
</div>
<div class="meow-setting-row">
<label>Spawn W spread (px)</label>
<input class="num-spin" type="number" id="meowWidthN" min="0" max="800" step="10" value="1900">
</div>
<div class="meow-setting-row">
<label>Random tilt (±deg)</label>
<input class="num-spin" type="number" id="meowTiltN" min="0" max="45" step="1" value="12">
</div>
<div class="meow-setting-row">
<label>Meow Texts (CSV):</label>
<input type="text" id="meowTexts" placeholder="MEOW!,MEOW!!,MEOW !" value="MEOW!,MEOW !!,MEOW !">
</div>
</div>

<header>

<button class="folder-btn" id="btn-all" onclick="loadImages('all')">All</button>
<button class="folder-btn" id="btn-good" onclick="loadImages('good')">Good</button>
<button class="folder-btn" id="btn-bad" onclick="loadImages('bad')">Bad</button>
<button class="folder-btn" onclick="shuffleCurrent()">Shuffle</button>

<button class="folder-btn" id="slideshowBtn" onclick="startSlideshow()">Slideshow</button>

</header>

<div class="gallery" id="gallery"></div>

<!-- viewer -->

<div class="viewer" id="viewer">

<button onclick="event.stopPropagation(); prevImage()" class="nav-btn left">◀</button>

<div class="viewer-image">

<img id="full">

</div>



<button onclick="event.stopPropagation(); nextImage()" class="nav-btn right">▶</button>

<div id="viewerControls" style="position:fixed; bottom:1px; left:50%; transform:translateX(-50%); display:flex; gap:10px; align-items:center; z-index:5002; background:rgba(0,0,0,0.25); padding:10px 20px; border-radius:8px; transition:opacity 0.3s ease; opacity:1;">

<button onclick="prevImage()" title="Prev" class="control-btn">◀</button>
<button onclick="nextImage()" title="Next" class="control-btn">▶</button>
<button onclick="closeViewer()" title="Close" class="control-btn">✕</button>

<div class="control-section" style="margin-left:auto;">
<button onclick="toggleImageScale()" title="Toggle scale" class="control-btn" style="font-size:11px;">📐</button>
<button onclick="toggleOriginalSize()" title="Original size" class="control-btn" style="font-size:10px;">100%</button>

<div class="control-counter">
<span id="viewerCounterDisplay">1/0</span>
</div>

<button id="viewerBad" class="control-btn control-btn-small" style="display:none;">B</button>
<button id="viewerRemove" class="control-btn control-btn-small" style="display:none;">R</button>
<button id="viewerGood" class="control-btn control-btn-small" style="display:none;">G</button>
</div>

</div>

</div>

<!-- slideshow -->

<div id="slideshow">

<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex-1)" class="nav-btn left">◀</button>

<div class="slide" id="slideA">
<div class="slide-image">
<img>
</div>
</div>
<div class="slide" id="slideB">
<div class="slide-image">
<img>
</div>
</div>

<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex+1)" class="nav-btn right">▶</button>

<div id="slideshowControls">
<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex-1)" title="Prev" class="control-btn">◀</button>
<button onclick="event.stopPropagation(); resetControlsHideTimer(); disableAutoAdvance(); showSlide(slideIndex+1)" title="Next" class="control-btn">▶</button>
<button id="slideshowDirectionBtn" onclick="resetControlsHideTimer(); togglePlayDirection()" title="Play Forward" class="control-btn">⏩</button>
<button onclick="resetControlsHideTimer(); togglePlay()" title="Play/Pause" class="control-btn">⏯</button>
<button onclick="closeSlideshowAndReset()" title="Close" class="control-btn">✕</button>

<div class="speed-control">
<label class="speed-label">img/s:</label>
<input class="num-input" type="number" id="speedNum" min="0.1" max="20" step="0.1" value="0.3" style="width:65px;">
</div>

<div id="slideshowMode">
<span id="modeDisplay">⏸</span>
</div>

<div class="fade-control">
<label class="fade-label">fade:</label>
<input class="num-input" type="number" id="fadeNum" min="0.1" max="5" step="0.1" value="2" style="width:50px;">
<span class="fade-unit">s</span>
</div>

<div class="control-section" style="margin-left:auto;">
<button onclick="resetControlsHideTimer(); toggleImageScale()" title="Toggle scale" class="control-btn" style="font-size:14px;">📐</button>
<button onclick="resetControlsHideTimer(); toggleOriginalSize()" title="Original size" class="control-btn" style="font-size:12px;">100%</button>

<div class="control-counter">
<span id="slideshowCounterDisplay">1/0</span>
</div>

<button id="slideshowBad" class="control-btn control-btn-small">B</button>
<button id="slideshowRemove" class="control-btn control-btn-small">R</button>
<button id="slideshowGood" class="control-btn control-btn-small">G</button>
</div>

</div>
<div id="slideProgress" style="width:0%"></div>

</div>

<script>

/* core variables */

const gallery=document.getElementById('gallery')
const viewer=document.getElementById('viewer')
const full=document.getElementById('full')

let slideIndex=0
let slideshowTimer=null
let slideshowDirection=1
let playing=false
let slideshowSpeed=0.3
let autoAdvanceDisabled=false
let autoAdvanceTimeout=null

let currentImages=[]
let currentIndex=0
let currentFolder='all'

/* slideshow start */

function startSlideshow(){

if(currentImages.length===0) return

document.getElementById('slideshow').style.display='block'
document.querySelector('header').style.display='none'

// Make page tall so browser scrollbar works naturally
document.body.style.height = (currentImages.length * 400 + window.innerHeight) + 'px'
window.scrollTo(0, 0)

slideIndex=0
showSlide(0)

// Auto-start playing
if(!playing){
togglePlay()
}

// Reset controls hide timer
resetControlsHideTimer()

}

function closeSlideshowAndReset(){
document.getElementById('slideshow').style.display='none'
document.querySelector('header').style.display='block'
document.body.style.height = ''
window.scrollTo(0, galleryScrollPosition)
clearTimeout(controlsHideTimer)
slideshowControls.classList.remove('hidden')
}

/* fade logic */

let lastSlideShown = -1

function showSlide(i){

if(i<0) i=currentImages.length-1
if(i>=currentImages.length) i=0

// Only apply fade transition if actually changing slides
if(i === lastSlideShown) return
lastSlideShown = i

slideIndex=i

const slideshow = document.getElementById('slideshow')
const isInSlideshow = slideshow && slideshow.style.display === 'block'

// update progress bar at bottom
if(currentImages.length>1){
document.getElementById('slideProgress').style.width=(i/(currentImages.length-1)*100)+'%'
}

const slide1=document.getElementById('slideA')
const slide2=document.getElementById('slideB')

const active=slide1.classList.contains('active')?slide1:slide2
const next=active===slide1?slide2:slide1

next.querySelector('img').src=currentImages[i]

active.classList.remove('active')
next.classList.add('active')

// Update image counter
const counterDisplay = document.getElementById('slideshowCounterDisplay')
if(counterDisplay){
counterDisplay.textContent = (i+1) + '/' + currentImages.length
}

// Delay scroll update until fade finishes (but only if user isn't actively scrolling)
if(isInSlideshow && !userScrollingInSlideshow){
setTimeout(() => {
if(slideshow.style.display === 'block' && !userScrollingInSlideshow){
const scrollY = (i / (currentImages.length - 1)) * (document.body.scrollHeight - window.innerHeight)
window.scrollTo(0, scrollY)
}
}, fadeDuration * 1000)
}

}

/* autoplay */

function disableAutoAdvance(){
clearTimeout(autoAdvanceTimeout)
autoAdvanceDisabled=true
autoAdvanceTimeout=setTimeout(()=>{
autoAdvanceDisabled=false
}, 5000)
}

function playStep(){
if(autoAdvanceDisabled) return
showSlide(slideIndex+slideshowDirection)
}

function togglePlay(){

playing=!playing
updateModeDisplay()

if(playing){
const interval = Math.round(1000 / slideshowSpeed)
slideshowTimer=setInterval(playStep, interval)
}else{
clearInterval(slideshowTimer)
}

}

function updateModeDisplay(){
const modeDisplay = document.getElementById('modeDisplay')
if(!playing){
modeDisplay.textContent = '⏸'
}else if(slideshowDirection === 1){
modeDisplay.textContent = '▶'
}else{
modeDisplay.textContent = '◀'
}
}

function forwardPlay(){
slideshowDirection=1
if(playing) togglePlay()
togglePlay()
updateModeDisplay()
}

function reversePlay(){
slideshowDirection=-1
if(playing) togglePlay()
togglePlay()
updateModeDisplay()
}

function togglePlayDirection(){
slideshowDirection = slideshowDirection === 1 ? -1 : 1
const dirBtn = document.getElementById('slideshowDirectionBtn')
if(slideshowDirection === 1){
dirBtn.textContent = '⏩'
dirBtn.title = 'Play Forward'
}else{
dirBtn.textContent = '⏪'
dirBtn.title = 'Play Backward'
}
updateModeDisplay()
}

let imageScaleMode = false // false = no max, true = with max

let imageOriginalSizeMode = false // true = show at original image dimensions

function toggleImageScale(){
imageScaleMode = !imageScaleMode
const slides = document.querySelectorAll('.slide img')
const viewers = document.querySelectorAll('.viewer-image img')
if(imageScaleMode){
slides.forEach(img => {
img.style.maxWidth = '95vw'
img.style.maxHeight = '95vh'
})
viewers.forEach(img => {
img.style.maxWidth = '95vw'
img.style.maxHeight = '95vh'
})
}else{
slides.forEach(img => {
img.style.maxWidth = '100%'
img.style.maxHeight = '100%'
})
viewers.forEach(img => {
img.style.maxWidth = '100%'
img.style.maxHeight = '100%'
})
}
document.cookie = 'imageScaleMode=' + (imageScaleMode ? '1' : '0') + '; path=/; max-age=31536000'
}

function toggleOriginalSize(){
imageOriginalSizeMode = !imageOriginalSizeMode
const slides = document.querySelectorAll('.slide img')
const viewers = document.querySelectorAll('.viewer-image img')
if(imageOriginalSizeMode){
// Show at original size - remove all constraints
slides.forEach(img => {
img.style.width = 'auto'
img.style.height = 'auto'
img.style.maxWidth = 'none'
img.style.maxHeight = 'none'
img.style.objectFit = 'none'
})
viewers.forEach(img => {
img.style.width = 'auto'
img.style.height = 'auto'
img.style.maxWidth = 'none'
img.style.maxHeight = 'none'
img.style.objectFit = 'none'
})
}else{
// Reset to normal - fill container with contain
slides.forEach(img => {
img.style.width = '100%'
img.style.height = '100%'
img.style.maxWidth = ''
img.style.maxHeight = ''
img.style.objectFit = 'contain'
})
viewers.forEach(img => {
img.style.width = '100%'
img.style.height = '100%'
img.style.maxWidth = ''
img.style.maxHeight = ''
img.style.objectFit = 'contain'
})
}
document.cookie = 'imageOriginalSizeMode=' + (imageOriginalSizeMode ? '1' : '0') + '; path=/; max-age=31536000'
}

function loadImageScaleFromCookie(){
const cookies = document.cookie.split(';')
for(let cookie of cookies){
const [name, val] = cookie.trim().split('=')
if(name === 'imageScaleMode' && val === '1'){
imageScaleMode = false // Set to false so toggle sets it to true
toggleImageScale()
}
}
}

function loadOriginalSizeFromCookie(){
const cookies = document.cookie.split(';')
for(let cookie of cookies){
const [name, val] = cookie.trim().split('=')
if(name === 'imageOriginalSizeMode' && val === '1'){
imageOriginalSizeMode = false // Set to false so toggle sets it to true
toggleOriginalSize()
}
}
}

/* speed control */

document.getElementById('speedNum').addEventListener('input', e=>{
slideshowSpeed = parseFloat(e.target.value)||0.3
if(playing){
clearInterval(slideshowTimer)
const interval = Math.round(1000 / slideshowSpeed)
slideshowTimer = setInterval(playStep, interval)
}
localStorage.setItem('slideshowSpeed', slideshowSpeed)
resetControlsHideTimer()
})

/* fade duration control */

let fadeDuration = 2.0
document.getElementById('fadeNum').addEventListener('input', e=>{
fadeDuration = parseFloat(e.target.value)||2.0
document.documentElement.style.setProperty('--fade-duration', fadeDuration + 's')
localStorage.setItem('slideshowFadeDuration', fadeDuration)
resetControlsHideTimer()
})

/* slideshow controls auto-hide after 2 seconds */

/* scroll position tracking for gallery to fullscreen */

let galleryScrollPosition = 0

/* scroll tracking for slideshow and viewer - proportional to scroll position */

let cumulativeScroll = 0
const scrollThreshold = 50 // pixels needed to change slide
let lastMiddleClick = 0
let autoscrollActive = false
let lastImageIndex = -1
let lastSlideshowIndex = -1
let ignoreScrollEvents = false
let userScrollingInSlideshow = false
let scrollTimeoutId = null

// Detect middle mouse down for Firefox autoscroll
document.addEventListener('mousedown', e => {
if(e.button === 1){
lastMiddleClick = Date.now()
}
})

// Wheel scroll in slideshow - let browser scroll naturally, scroll event handles slide change
document.addEventListener('wheel', e => {
const slideshow = document.getElementById('slideshow')
if(slideshow.style.display !== 'block') return
// No preventDefault - let browser scroll so native scrollbar works
}, {passive: true})

// Track scroll position for both viewer and slideshow modes
document.addEventListener('scroll', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
const now = Date.now()

// Slideshow mode - use proportional scroll mapping like viewer
if(slideshow.style.display === 'block'){
if(currentImages.length === 0) return

// Mark that user is scrolling - prevents programmatic scroll updates from conflicting
userScrollingInSlideshow = true
clearTimeout(scrollTimeoutId)
scrollTimeoutId = setTimeout(() => {
userScrollingInSlideshow = false
}, 300)

// Disable auto-advance while user is scrolling
disableAutoAdvance()

const scrollY = window.scrollY || document.documentElement.scrollTop
const documentHeight = document.documentElement.scrollHeight
const viewportHeight = window.innerHeight

// Total scrollable distance
const totalScroll = documentHeight - viewportHeight

// Calculate which slide should be shown based on scroll percentage
let imageIndex = 0
if(totalScroll > 0){
const scrollPercentage = scrollY / totalScroll
imageIndex = Math.min(
Math.floor(scrollPercentage * currentImages.length),
currentImages.length - 1
)
}

// Only update if we've moved to a different slide
if(imageIndex !== lastSlideshowIndex){
lastSlideshowIndex = imageIndex
slideIndex = imageIndex
showSlide(imageIndex)
}
return
}

// Viewer mode - use proportional scroll mapping
if(viewer.style.display !== 'flex' || currentImages.length === 0 || ignoreScrollEvents) return

const scrollY = window.scrollY || document.documentElement.scrollTop
const documentHeight = document.documentElement.scrollHeight
const viewportHeight = window.innerHeight

// Total scrollable distance
const totalScroll = documentHeight - viewportHeight

// Calculate which image should be shown based on scroll percentage
let imageIndex = 0
if(totalScroll > 0){
const scrollPercentage = scrollY / totalScroll
imageIndex = Math.min(
Math.floor(scrollPercentage * currentImages.length),
currentImages.length - 1
)
}

// Only update if we've moved to a different image
if(imageIndex !== lastImageIndex){
lastImageIndex = imageIndex
showImage(imageIndex)
}
}, {passive: true})

document.addEventListener('mouseup', e => {
if(e.button === 1){
autoscrollActive = false
cumulativeScroll = 0
}
})

/* keyboard controls in slideshow */

document.addEventListener('keydown', e => {
const slideshow = document.getElementById('slideshow')

// Space to start slideshow (if not already open and not in viewer mode)
if(e.key === ' ' && slideshow.style.display !== 'block' && viewer.style.display !== 'flex'){
e.preventDefault()
startSlideshow()
return
}

if(slideshow.style.display !== 'block') return

if(e.key === 'ArrowRight') showSlide(slideIndex + 1)
if(e.key === 'ArrowLeft') showSlide(slideIndex - 1)
if(e.key === 'Escape') closeSlideshowAndReset()
if(e.key === ' '){
e.preventDefault()
togglePlay()
}
})

/* gallery */

function createImageContainer(src){

const c=document.createElement('div')
c.className='image-container'

const img=document.createElement('img')
img.src=src

img.onclick=()=>{
// Save current scroll position FIRST
galleryScrollPosition = window.scrollY || document.documentElement.scrollTop

// Find index and set current index
currentIndex=currentImages.indexOf(src)
lastImageIndex = currentIndex  // Prevent scroll events from overriding

// Disable scroll-based image updates briefly
ignoreScrollEvents = true
setTimeout(() => { ignoreScrollEvents = false }, 200)

// Show viewer and image
viewer.style.display='flex'
document.querySelector('header').style.display='none'
full.src=src

// Update viewer counter with correct index
const viewerCounterDisplay = document.getElementById('viewerCounterDisplay')
if(viewerCounterDisplay){
viewerCounterDisplay.textContent = (currentIndex+1) + '/' + currentImages.length
}

// Update button visibility based on current folder
updateViewerButtonVisibility()

// Reset button fade timer
resetViewerButtonsHideTimer()
}

const g=document.createElement('button')
g.className='overlay-btn overlay-good'
g.textContent=currentFolder==='good' ? 'R' : currentFolder==='bad' ? 'G' : 'G'
g.onclick=e=>{
e.stopPropagation()
let target = 'good'
if(currentFolder==='good') target='regular'
else if(currentFolder==='bad') target='good'
moveGalleryImage(src, target, c)
}

const b=document.createElement('button')
b.className='overlay-btn overlay-bad'
b.textContent=currentFolder==='bad' ? 'R' : currentFolder==='good' ? 'B' : 'B'
b.onclick=e=>{
e.stopPropagation()
let target = 'bad'
if(currentFolder==='bad') target='regular'
else if(currentFolder==='good') target='bad'
moveGalleryImage(src, target, c)
}

c.appendChild(img)
c.appendChild(g)
c.appendChild(b)

return c

}

}

document.querySelector('header').style.display='none'

}

}
})

/* meow settings */

const meowToggle = document.getElementById('meowToggle')
const meowSettingsBtn = document.getElementById('meowSettingsBtn')
const meowSettingsPanel = document.getElementById('meowSettings')
const meowTexts = document.getElementById('meowTexts')

const meowFreqN = document.getElementById('meowFreqN')
const meowCountN = document.getElementById('meowCountN')
const meowDelayN = document.getElementById('meowDelayN')
const meowSlideN = document.getElementById('meowSlideN')
const meowFadeN = document.getElementById('meowFadeN')
const meowDirSel = document.getElementById('meowDirSel')
const meowPosN = document.getElementById('meowPosN')
const meowHeightN = document.getElementById('meowHeightN')
const meowWidthN = document.getElementById('meowWidthN')
const meowTiltN = document.getElementById('meowTiltN')

let meowFrequency = 1
let meowCount = 1
let meowDelayMs = 0
let meowSlideDuration = 1
let meowFadeDuration = 10
let meowDirection = 1
let meowPosition = 20
let meowSpawnHeight = 15
let meowSpawnWidth = 1900
let meowTilt = 12

meowSettingsBtn.addEventListener('click', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
meowSettingsPanel.classList.toggle('open')
})

document.addEventListener('click', e => {
if(!meowSettingsPanel.contains(e.target) && e.target !== meowSettingsBtn){
meowSettingsPanel.classList.remove('open')
}
})

;[meowFreqN,meowCountN,meowDelayN,meowSlideN,meowFadeN,meowPosN,meowHeightN,meowWidthN,meowTiltN,meowDirSel,meowTexts].forEach(el=>{
el.addEventListener('input', ()=>{
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
meowFrequency = parseFloat(meowFreqN.value)||1
meowCount = parseInt(meowCountN.value)||1
meowDelayMs = parseInt(meowDelayN.value)||0
meowSlideDuration = parseFloat(meowSlideN.value)||1
meowFadeDuration = parseFloat(meowFadeN.value)||10
meowDirection = parseInt(meowDirSel.value)||1
meowPosition = parseInt(meowPosN.value)||20
meowSpawnHeight = parseInt(meowHeightN.value)||15
meowSpawnWidth = parseInt(meowWidthN.value)||1900
meowTilt = parseInt(meowTiltN.value)||12
saveMeowSettings()
})
})

function saveMeowSettings(){
const settings = {
frequency: meowFrequency, count: meowCount, delayMs: meowDelayMs,
slideDuration: meowSlideDuration, fadeDuration: meowFadeDuration,
direction: meowDirection, position: meowPosition,
spawnHeight: meowSpawnHeight, spawnWidth: meowSpawnWidth,
tilt: meowTilt, texts: meowTexts.value
}
document.cookie = 'meowSettings=' + encodeURIComponent(JSON.stringify(settings)) + '; path=/; max-age=31536000'
}

function loadMeowSettings(){
const cookies = document.cookie.split(';')
for(let cookie of cookies){
const [name, val] = cookie.trim().split('=')
if(name === 'meowSettings'){
try{
const s = JSON.parse(decodeURIComponent(val))
meowFrequency = s.frequency||1; meowCount = s.count||1; meowDelayMs = s.delayMs||0
meowSlideDuration = s.slideDuration||1; meowFadeDuration = s.fadeDuration||10
meowDirection = s.direction||1; meowPosition = s.position||20
meowSpawnHeight = s.spawnHeight!==undefined ? s.spawnHeight : 15
meowSpawnWidth = s.spawnWidth!==undefined ? s.spawnWidth : 1900
meowTilt = s.tilt||12
meowFreqN.value = meowFrequency; meowCountN.value = meowCount; meowDelayN.value = meowDelayMs
meowSlideN.value = meowSlideDuration; meowFadeN.value = meowFadeDuration
meowDirSel.value = meowDirection; meowPosN.value = meowPosition
meowHeightN.value = meowSpawnHeight; meowWidthN.value = meowSpawnWidth
meowTiltN.value = meowTilt
if(s.texts) meowTexts.value = s.texts
}catch(e){}
break
}
}
}

function startMeowSpawning(){
let nextSpawnTime = 0
setInterval(() => {
if(!meowToggle.checked) return
const now = Date.now()
const timeSinceLastSpawn = now - nextSpawnTime
const intervalMs = Math.ceil(1000 / meowFrequency)
if(timeSinceLastSpawn < intervalMs) return
nextSpawnTime = now

const textList = meowTexts.value.split(',').map(t => t.trim()).filter(t => t.length > 0)
if(textList.length === 0) return

// Spawn multiple meows
for(let n = 0; n < meowCount; n++){
// Calculate randomness upfront so each meow gets unique values
const offsetY = Math.random() * meowSpawnHeight - meowSpawnHeight / 2
const offsetX = Math.random() * meowSpawnWidth - meowSpawnWidth / 2
const tiltDeg = meowTilt > 0 ? (Math.random() * 2 - 1) * meowTilt : 0
const dirRandom = Math.random() > 0.5 ? 100 : -100

setTimeout(() => {
// Calculate direction movement
let moveYStart = 0, moveYEnd = 0, moveXStart = 0, moveXEnd = 0

if(meowDirection === 0){
// → right
moveXStart = -100
moveXEnd = 100
} else if(meowDirection === 1){
// ↑ up
moveYStart = 100
moveYEnd = -100
} else if(meowDirection === 2){
// ↓ down
moveYStart = -100
moveYEnd = 100
} else if(meowDirection === 3){
// ← left
moveXStart = dirRandom
moveXEnd = -dirRandom
}

const m = document.createElement('div')
m.className = 'meow'
m.textContent = textList[Math.floor(Math.random() * textList.length)]
m.style.top = meowPosition + '%'
m.style.left = '50%'
m.style.setProperty('--meow-slide', meowSlideDuration + 's')
m.style.setProperty('--meow-duration', meowFadeDuration + 's')
m.style.setProperty('--meow-visible-y', offsetY + 'px')
m.style.setProperty('--meow-visible-x', offsetX + 'px')
m.style.setProperty('--meow-start-y', (moveYStart + offsetY) + 'px')
m.style.setProperty('--meow-start-x', (moveXStart + offsetX) + 'px')
m.style.setProperty('--meow-end-y', (moveYEnd + offsetY) + 'px')
m.style.setProperty('--meow-end-x', (moveXEnd + offsetX) + 'px')
m.style.setProperty('--meow-tilt', tiltDeg + 'deg')
document.body.appendChild(m)
setTimeout(() => m.remove(), (meowSlideDuration + meowFadeDuration) * 1000)
}, meowDelayMs * n)
}
}, 50)
}

meowToggle.addEventListener('change', () => {
const slideshow = document.getElementById('slideshow')
const viewer = document.getElementById('viewer')
if(slideshow.style.display === 'block') resetControlsHideTimer()
if(viewer.style.display === 'flex') resetViewerButtonsHideTimer()
saveMeowSettings()
})

loadCounts()
loadMeowSettings()
startMeowSpawning()
loadImageScaleFromCookie()
loadOriginalSizeFromCookie()

// Load slideshow settings from localStorage
const savedSpeed = localStorage.getItem('slideshowSpeed')
const savedFade = localStorage.getItem('slideshowFadeDuration')
if(savedSpeed){
slideshowSpeed = parseFloat(savedSpeed)
document.getElementById('speedNum').value = slideshowSpeed
}
if(savedFade){
fadeDuration = parseFloat(savedFade)
document.getElementById('fadeNum').value = fadeDuration
document.documentElement.style.setProperty('--fade-duration', fadeDuration + 's')
}

loadImages('all')
